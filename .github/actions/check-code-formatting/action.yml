name: "🐙 Check: Check and fix source code formatting"
description: "Check project formatting, and if it fails, fix it."

inputs:
  check-command:
    description: "The command that checks if formatting is correct."
    required: true
  fix-command:
    description: "The command that fixes formatting if incorrect."
    required: true

runs:
  using: "composite"
  steps:
    # TODO(https://github.com/actions/runner/issues/1348): Replace this workaround
    # with the `$/` syntax once GitHub ships native self-referencing support.
    - name: Link godot-infra actions into workspace
      id: godot-infra-init
      shell: bash
      env:
        MSYS: winsymlinks:nativestrict
      run: |
        if [ -e "$GITHUB_WORKSPACE/.godot-infra" ]; then
          exit 0
        fi

        ln -sfn "$(cd "${{ github.action_path }}/../../.." && pwd)" "$GITHUB_WORKSPACE/.godot-infra"
        echo "created=true" >> "$GITHUB_OUTPUT"

    # Check source code
    - name: Check formatting
      id: check-formatting
      continue-on-error: true
      shell: bash
      run: |-
        # Set options to enable more extensive globbing.
        shopt -s extglob
        shopt -s globstar

        ${{ inputs.check-command }}

    # Fix source code
    - name: Fix formatting
      if: steps.check-formatting.outcome == 'failure'
      shell: bash
      run: |-
        # Set options to enable more extensive globbing.
        shopt -s extglob
        shopt -s globstar

        ${{ inputs.fix-command }}

    - uses: ./.godot-infra/commit-changes
      if: steps.check-formatting.outcome == 'failure'
      with:
        description: "fix formatting"

    - name: Fail workflow
      if: steps.check-formatting.outcome == 'failure'
      shell: bash
      run: exit 1

    - name: Remove godot-infra workspace link
      if: always() && steps.godot-infra-init.outputs.created == 'true'
      shell: bash
      run: rm -rf "$GITHUB_WORKSPACE/.godot-infra"
